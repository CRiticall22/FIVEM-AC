<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.3/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <title>ElectronAC</title>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="panel" id="panel">
        <div class="sidebar">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                <span>ElectronAC</span>
            </div>
            <nav>
                <button class="nav-btn active" data-page="home">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Dashboard
                </button>
                <button class="nav-btn" data-page="tools">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    Tools
                </button>
            </nav>
            <div class="sidebar-footer">
                <span class="version">v2.0.0</span>
            </div>
        </div>
        <div class="content">
            <button class="close-btn" id="closeBtn">&times;</button>

            <div class="page active" id="page-home">
                <h2>Dashboard</h2>
                <div class="card-row">
                    <div class="card">
                        <span class="card-label">Routing Bucket</span>
                        <input type="number" id="routingBucket" value="0" min="0" />
                    </div>
                    <div class="card">
                        <span class="card-label">Admin ESP</span>
                        <label class="toggle">
                            <input type="checkbox" id="espToggle" />
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="page" id="page-tools">
                <h2>Entity Tools</h2>
                <div class="card-row">
                    <button class="action-btn danger" id="deleteVehicles">Delete All Vehicles</button>
                    <button class="action-btn danger" id="deletePeds">Delete All Peds</button>
                    <button class="action-btn danger" id="deleteObjects">Delete All Objects</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="renderer.js"></script>
    <script src="recognition.js"></script>
    <script src="stream.js"></script>
    <script src="menu.js"></script>
</body>
</html>
