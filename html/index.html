<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.3/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <title>ElectronAC</title>
</head>
<body>
    <div class="overlay" id="overlay"></div>

    <div class="panel" id="panel">
        <div class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><circle cx="12" cy="17" r=".5"/></svg>
                </div>
                <div class="brand-text">
                    <span class="brand-name">ElectronAC</span>
                    <span class="brand-ver">v2.0.0</span>
                </div>
            </div>

            <nav class="nav-list">
                <button class="nav-item active" data-page="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-page="players">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Players</span>
                </button>
                <button class="nav-item" data-page="bans">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m4.93 4.93 14.14 14.14"/></svg>
                    <span>Bans</span>
                </button>
                <button class="nav-item" data-page="detections">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
                    <span>Detections</span>
                </button>
                <button class="nav-item" data-page="tools">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    <span>Tools</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="status-dot"></div>
                <span>Protected</span>
            </div>
        </div>

        <div class="main-content">
            <div class="topbar">
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
                <button class="close-btn" id="closeBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>

            <div class="page active" id="page-dashboard">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="statPlayers">0</span>
                            <span class="stat-label">Online</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m4.93 4.93 14.14 14.14"/></svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="statBans">0</span>
                            <span class="stat-label">Total Bans</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon yellow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/></svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="statDetections">0</span>
                            <span class="stat-label">Detections</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="statUptime">0m</span>
                            <span class="stat-label">Uptime</span>
                        </div>
                    </div>
                </div>

                <div class="card-row">
                    <div class="glass-card wide">
                        <h3>Recent Activity</h3>
                        <div class="feed-list" id="dashboardFeed">
                            <div class="feed-empty">No recent activity</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="page" id="page-players">
                <div class="glass-card">
                    <div class="card-header">
                        <h3>Online Players</h3>
                        <input type="text" class="search-input" id="playerSearch" placeholder="Search players..." />
                    </div>
                    <div class="player-list" id="playerList">
                        <div class="feed-empty">Loading players...</div>
                    </div>
                </div>
            </div>

            <div class="page" id="page-bans">
                <div class="glass-card">
                    <div class="card-header">
                        <h3>Ban Management</h3>
                        <input type="text" class="search-input" id="banSearch" placeholder="Search by name or ID..." />
                    </div>
                    <div class="ban-list" id="banList">
                        <div class="feed-empty">Loading bans...</div>
                    </div>
                </div>
            </div>

            <div class="page" id="page-detections">
                <div class="glass-card">
                    <div class="card-header">
                        <h3>Detection Feed</h3>
                        <button class="btn-small" id="clearFeed">Clear</button>
                    </div>
                    <div class="detection-feed" id="detectionFeed">
                        <div class="feed-empty">Waiting for detections...</div>
                    </div>
                </div>
            </div>

            <div class="page" id="page-tools">
                <div class="tools-grid">
                    <div class="glass-card">
                        <h3>Entity Control</h3>
                        <div class="btn-group">
                            <button class="tool-btn danger" id="deleteVehicles">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                                Delete Vehicles
                            </button>
                            <button class="tool-btn danger" id="deletePeds">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                Delete Peds
                            </button>
                            <button class="tool-btn danger" id="deleteObjects">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                                Delete Objects
                            </button>
                        </div>
                    </div>

                    <div class="glass-card">
                        <h3>Admin Tools</h3>
                        <div class="tool-row">
                            <label>Routing Bucket</label>
                            <div class="input-group">
                                <input type="number" id="routingBucket" value="0" min="0" />
                                <button class="btn-small" id="setBucket">Set</button>
                            </div>
                        </div>
                        <div class="tool-row">
                            <label>Admin ESP</label>
                            <label class="toggle">
                                <input type="checkbox" id="espToggle" />
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="renderer.js"></script>
    <script src="recognition.js"></script>
    <script src="stream.js"></script>
    <script src="menu.js"></script>
</body>
</html>
